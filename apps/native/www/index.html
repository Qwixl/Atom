<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Atom</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        background: #111;
        color: #eee;
      }
      main {
        max-width: 28rem;
        padding: 1.5rem;
        text-align: center;
        line-height: 1.45;
      }
      a {
        color: #9cf;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Atom</h1>
      <p>
        This native shell loads the hosted web app. If you see this page, the
        remote URL did not load — check network access or
        <code>ATOM_NATIVE_SERVER_URL</code>.
      </p>
      <p>
        <a href="https://atom.qwixl.com/app/">Open Atom in browser</a>
      </p>
    </main>
  </body>
</html>
