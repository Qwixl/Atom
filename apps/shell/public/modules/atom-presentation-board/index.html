<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Presentation Board</title>
  <style>
    * { box-sizing: border-box; font-family: var(--atom-font-sans, system-ui, sans-serif); }
    body { margin: 0; padding: 12px; background: var(--atom-color-bg, #fff); color: var(--atom-color-text, #0a0a0a); min-height: 100%; }
    header { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 12px; }
    h1 { margin: 0; font-size: 15px; font-weight: 600; letter-spacing: -0.02em; }
    .muted { color: var(--atom-color-text-dim, #9e9e9e); font-size: 12px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
    .card {
      border: 1px solid var(--atom-color-border, #e5e5e5);
      border-radius: 8px;
      padding: 12px;
      background: var(--atom-color-bg, #fff);
      min-height: 110px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: border-color 220ms cubic-bezier(0.4, 0, 0.2, 1), transform 220ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card.is-highlight {
      border-color: var(--atom-color-text, #0a0a0a);
      transform: scale(1.02);
      box-shadow: 0 1px 2px rgb(10 10 10 / 0.08);
    }
    .card h2 { margin: 0; font-size: 13px; font-weight: 600; }
    .card p { margin: 0; font-size: 12px; color: var(--atom-color-text-dim, #9e9e9e); flex: 1; }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }
    button {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--atom-color-border, #e5e5e5);
      background: transparent;
      color: inherit;
      font: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    button.primary {
      background: var(--atom-color-accent, #0a0a0a);
      color: var(--atom-color-bg, #fff);
      border-color: transparent;
    }
    .empty { padding: 28px 12px; text-align: center; color: var(--atom-color-text-dim, #9e9e9e); font-size: 13px; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1 id="title">Presentation board</h1>
      <p class="muted" id="subtitle">Agent-controlled regions · owner pins</p>
    </div>
  </header>
  <div id="grid" class="grid" hidden></div>
  <p id="empty" class="empty">Ask your agent to place cards here — inbox summaries, upcoming events, notes, and more.</p>
  <script>
    let shellOrigin = null;
    let regions = [];
    let highlightId = null;

    function emit(name, payload) {
      if (shellOrigin) window.parent.postMessage({ type: "event", name, payload }, shellOrigin);
    }

    function render() {
      const grid = document.getElementById("grid");
      const empty = document.getElementById("empty");
      grid.innerHTML = "";
      if (!regions.length) {
        grid.hidden = true;
        empty.hidden = false;
        return;
      }
      empty.hidden = true;
      grid.hidden = false;
      for (const region of regions) {
        const card = document.createElement("article");
        card.className = "card" + (region.id === highlightId ? " is-highlight" : "");
        card.dataset.id = region.id;
        const h = document.createElement("h2");
        h.textContent = region.title || "Untitled";
        const p = document.createElement("p");
        p.textContent = region.body || "";
        const actions = document.createElement("div");
        actions.className = "actions";
        const pin = document.createElement("button");
        pin.type = "button";
        pin.textContent = region.pinned ? "Unpin" : "Pin";
        pin.addEventListener("click", () => emit("boardPinToggled", { id: region.id, pinned: !region.pinned }));
        const enlarge = document.createElement("button");
        enlarge.type = "button";
        enlarge.className = "primary";
        enlarge.textContent = "Focus";
        enlarge.addEventListener("click", () => emit("boardRegionFocused", { id: region.id }));
        const dismiss = document.createElement("button");
        dismiss.type = "button";
        dismiss.textContent = "Dismiss";
        dismiss.addEventListener("click", () => emit("boardRegionDismissed", { id: region.id }));
        actions.append(pin, enlarge, dismiss);
        card.append(h, p, actions);
        grid.appendChild(card);
      }
    }

    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data || data.type !== "init") return;
      shellOrigin = event.origin;
      const props = data.props || {};
      if (typeof props.title === "string" && props.title.trim()) {
        document.getElementById("title").textContent = props.title.trim();
      }
      if (typeof props.subtitle === "string") {
        document.getElementById("subtitle").textContent = props.subtitle;
      }
      regions = Array.isArray(props.regions) ? props.regions : [];
      highlightId = typeof props.highlightId === "string" ? props.highlightId : null;
      render();
      emit("boardReady", { regionCount: regions.length });
    });

    window.parent.postMessage({ type: "ready" }, "*");
  </script>
</body>
</html>
