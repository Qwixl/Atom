<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Meeting picker</title>
  <style>
    * { box-sizing: border-box; font-family: var(--atom-font-sans, system-ui, sans-serif); }
    body { margin: 0; padding: 10px 12px; background: var(--atom-color-bg, #fff); color: var(--atom-color-text, #111); }
    .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    input, select, button { font: inherit; }
    input, select {
      flex: 1; min-width: 120px; padding: 8px 10px;
      border: 1px solid var(--atom-color-border, #ccc); border-radius: var(--atom-radius-sm, 6px);
      background: var(--atom-color-bg-raised, #fafafa); color: inherit;
    }
    button.send {
      padding: 8px 14px; border: none; border-radius: var(--atom-radius-sm, 6px);
      background: var(--atom-color-accent, #111); color: var(--atom-color-bg, #fff); cursor: pointer;
    }
    button.send:disabled { opacity: 0.45; cursor: not-allowed; }
    .warn { margin-top: 8px; font-size: 12px; color: #b45309; }
    .busy-note { margin-top: 4px; font-size: 11px; color: var(--atom-color-text-dim, #666); }
  </style>
</head>
<body>
  <div class="row">
    <input id="title" type="text" placeholder="Title" aria-label="Meeting title" />
    <input id="start" type="datetime-local" aria-label="Date and time" />
    <select id="duration" aria-label="Duration">
      <option value="15">15 min</option>
      <option value="30" selected>30 min</option>
      <option value="45">45 min</option>
      <option value="60">1 hour</option>
      <option value="90">1.5 hours</option>
    </select>
    <button type="button" class="send" id="send">Send proposal</button>
  </div>
  <p class="warn" id="conflict" hidden>That time overlaps an event on your calendar.</p>
  <p class="busy-note" id="busyNote" hidden></p>
  <script>
    let shellOrigin = null;
    let busyEvents = [];
    const themeKeys = ["colorBg","colorBgRaised","colorText","colorTextDim","colorAccent","colorBorder","radiusSm","fontSans"];
    const cssMap = { colorBg:"--atom-color-bg", colorBgRaised:"--atom-color-bg-raised", colorText:"--atom-color-text", colorTextDim:"--atom-color-text-dim", colorAccent:"--atom-color-accent", colorBorder:"--atom-color-border", radiusSm:"--atom-radius-sm", fontSans:"--atom-font-sans" };
    function applyTheme(theme) {
      if (!theme) return;
      const root = document.documentElement.style;
      for (const k of themeKeys) if (theme[k]) root.setProperty(cssMap[k], theme[k]);
    }
    function defaultStart() {
      const next = new Date(); next.setMinutes(0,0,0); next.setHours(next.getHours()+1);
      const offset = next.getTimezoneOffset();
      return new Date(next.getTime() - offset * 60000).toISOString().slice(0,16);
    }
    function slotFromInputs(title, startLocal, durationMin) {
      const start = new Date(startLocal);
      if (Number.isNaN(start.getTime())) return null;
      const end = new Date(start.getTime() + durationMin * 60000);
      const label = start.toLocaleString(undefined, { weekday:"short", month:"short", day:"numeric", hour:"numeric", minute:"2-digit" });
      return { id: "slot-" + start.toISOString(), label, start: start.toISOString(), end: end.toISOString() };
    }
    function overlaps(slot, events) {
      if (!slot || !Array.isArray(events)) return false;
      const slotStart = new Date(slot.start).getTime();
      const slotEnd = new Date(slot.end).getTime();
      for (const ev of events) {
        const eventStart = new Date(ev.start).getTime();
        const eventEnd = new Date(ev.end).getTime();
        if (eventStart < slotEnd && eventEnd > slotStart) return true;
      }
      return false;
    }
    function updateConflict() {
      const startLocal = document.getElementById("start").value;
      const durationMin = Number(document.getElementById("duration").value);
      const title = document.getElementById("title").value.trim() || "Meeting";
      const slot = slotFromInputs(title, startLocal, durationMin);
      const conflict = overlaps(slot, busyEvents);
      document.getElementById("conflict").hidden = !conflict;
      const note = document.getElementById("busyNote");
      if (busyEvents.length > 0) {
        note.hidden = false;
        note.textContent = busyEvents.length + " upcoming calendar event(s) loaded from your WebCal feed.";
      } else {
        note.hidden = true;
      }
    }
    function emit(name, payload) {
      if (shellOrigin) window.parent.postMessage({ type:"event", name, payload }, shellOrigin);
    }
    document.getElementById("send").addEventListener("click", () => {
      const title = document.getElementById("title").value.trim() || "Meeting";
      const startLocal = document.getElementById("start").value;
      const durationMin = Number(document.getElementById("duration").value);
      const slot = slotFromInputs(title, startLocal, durationMin);
      if (!slot) return;
      emit("meetingProposed", { title, slots: [slot] });
    });
    document.getElementById("start").addEventListener("change", updateConflict);
    document.getElementById("duration").addEventListener("change", updateConflict);
    window.addEventListener("message", (event) => {
      const data = event.data;
      if (!data || data.type !== "init") return;
      shellOrigin = event.origin;
      applyTheme(data.theme);
      const props = data.props || {};
      busyEvents = Array.isArray(props.busyEvents) ? props.busyEvents : [];
      document.getElementById("title").value = props.defaultTitle || "Meeting";
      document.getElementById("start").value = props.defaultStart || defaultStart();
      if (props.peerName) document.getElementById("title").placeholder = "Meeting with " + props.peerName;
      updateConflict();
    });
    window.parent.postMessage({ type: "ready" }, "*");
  </script>
</body>
</html>
