services:
  atom-agent:
    image: atom-agent:latest
    build:
      context: .
      dockerfile: packages/agent-backend/Dockerfile
    ports:
      - "${ATOM_AGENT_PORT:-5204}:5204"
    environment:
      HOST: "0.0.0.0"
      PORT: "5204"
      PUBLIC_BASE_URL: "${PUBLIC_BASE_URL:-http://127.0.0.1:5204}"
      AGENT_NAME: "${AGENT_NAME:-Atom agent}"
      ATOM_DATA_DIR: "/data"
      ATOM_SHELL_ORIGINS: "${ATOM_SHELL_ORIGINS:-}"
    volumes:
      - atom-agent-data:/data
    restart: unless-stopped

  demo-peer-agent:
    build:
      context: .
      dockerfile: packages/agent-backend/Dockerfile
    ports:
      - "${DEMO_PEER_PORT:-5205}:5205"
    environment:
      HOST: "0.0.0.0"
      PORT: "5205"
      PUBLIC_BASE_URL: "${DEMO_PEER_PUBLIC_URL:-http://127.0.0.1:5205}"
      AGENT_NAME: "Qwixl demo peer"
      ATOM_DATA_DIR: "/data"
      ATOM_DEMO_PEER: "1"
      ATOM_ADMIN_TOKEN: "${DEMO_PEER_ADMIN_TOKEN:-atom-demo-peer-token}"
      ATOM_SHELL_ORIGINS: "${ATOM_SHELL_ORIGINS:-http://localhost:5200,http://127.0.0.1:5200}"
    volumes:
      - demo-peer-data:/data
    restart: unless-stopped

  control-plane:
    build:
      context: .
      dockerfile: apps/control-plane/Dockerfile
    ports:
      - "${CONTROL_PLANE_PORT:-5300}:5300"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "5300"
      ATOM_CONTROL_PLANE_DATA_DIR: /data
    volumes:
      - control-plane-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  atom-agent-data:
  demo-peer-data:
  control-plane-data:
