name: Deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  actions: read

jobs:
  deploy-shell-atom:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build:packages
      - run: pnpm registry:verify
      - run: pnpm --filter @qwixl/shell-app build
        env:
          VITE_CONTROL_PLANE_URL: https://control.atom.qwixl.com
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - uses: amondnet/vercel-action@16e87c0a08142b0d0d33b76aeaf20823c381b9b9 # v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_SHELL_ATOM }}
          vercel-version: latest
          vercel-args: "--prod"

  deploy-atom-registry:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build:packages
      - run: pnpm registry:verify
      - run: pnpm --filter @qwixl/registry-host build

      - uses: amondnet/vercel-action@16e87c0a08142b0d0d33b76aeaf20823c381b9b9 # v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_ATOM_REGISTRY }}
          vercel-version: latest
          vercel-args: "--prod"

  deploy-control-plane:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Load SSH key
        uses: webfactory/ssh-agent@dc588b651fe13675774614f8e6a936a468676387 # v0.9.0
        with:
          ssh-private-key: ${{ secrets.CONTROL_PLANE_SSH_PRIVATE_KEY }}

      - name: Trust control plane host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.CONTROL_PLANE_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull and restart control plane
        env:
          SSH_HOST: ${{ secrets.CONTROL_PLANE_SSH_HOST }}
          SSH_USER: ${{ secrets.CONTROL_PLANE_SSH_USER }}
        run: |
          ssh "${SSH_USER}@${SSH_HOST}" <<'EOF'
          set -euo pipefail
          cd /opt/atom
          git fetch origin --prune
          git checkout main
          git reset --hard origin/main
          docker compose build control-plane
          docker compose up -d control-plane
          sleep 5
          curl -sf http://127.0.0.1:5300/health
          EOF
