# Atom NPC swarm bus — separate from Qwixl Company OS.
# Secrets: ~/atom/secrets/agent.env only (never ~/qwixl/secrets).
#
#   cd ~/atom/repos/atom/ops/swarm-host
#   docker compose up -d atom-bus

services:
  atom-bus:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ${HOME}/atom/state/redis:/data
    labels:
      atom.stack: swarm
      atom.role: bus
