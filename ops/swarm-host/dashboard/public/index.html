<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Atom swarm dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="top">
      <div>
        <p class="eyebrow">Atom · Optimus</p>
        <h1>Swarm dashboard</h1>
      </div>
      <div class="top-meta">
        <span id="stamp">Loading…</span>
        <button type="button" id="refresh" class="btn">Refresh</button>
        <label class="auto">
          <input type="checkbox" id="autorefresh" checked />
          Auto 8s
        </label>
      </div>
    </header>

    <section class="summary" id="summary"></section>

    <section class="layout">
      <div>
        <h2>Agents</h2>
        <div id="agents" class="agent-grid"></div>
      </div>
      <aside>
        <h2>Police findings</h2>
        <div id="findings" class="panel"></div>
        <h2>Chronicle</h2>
        <pre id="chronicle" class="panel code"></pre>
      </aside>
    </section>

    <dialog id="detail">
      <form method="dialog" class="detail-head">
        <h2 id="detail-title">Agent</h2>
        <button type="submit" class="btn">Close</button>
      </form>
      <div id="detail-body"></div>
    </dialog>

    <script src="/app.js" type="module"></script>
  </body>
</html>
